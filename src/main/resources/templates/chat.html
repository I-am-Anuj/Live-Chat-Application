<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LiveChat</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/stomp.js/2.3.1/stomp.min.js"></script>
</head>
<body>

<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-6">

            <div class="card shadow-sm">
                <div class="card-header bg-primary text-white d-flex justify-content-between align-items-center">
                    <h5 class="mb-0">LiveChat</h5>
                    <small id="statusLabel">Connecting...</small>
                </div>

                <div id="chat" class="card-body border-bottom">
                    <div id="emptyState" class="text-center text-muted mt-5">
                        <p>No messages yet.</p>
                    </div>
                </div>

                <div class="card-footer bg-white p-3">
                    <div class="input-group mb-2">
                        <span class="input-group-text">@</span>
                        <input id="senderInput" type="text" class="form-control" placeholder="Your Name">
                    </div>
                    <div class="input-group">
                        <input id="messageInput" type="text" class="form-control" placeholder="Type a message...">
                        <button class="btn btn-primary" id="sendMessage" disabled>Send</button>
                    </div>
                    <div id="conn-banner" class="form-text mt-2 text-center">Connecting to server...</div>
                </div>
            </div>

        </div>
    </div>
</div>
<script src="/js/app.js"></script>
</body>
</html>
